name: kollab-payload-prod

services:
  payload:
    container_name: payload-prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8890:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    volumes:
      - payload_media:/app/public/media


  postgres:
    container_name: postgres-prod
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER:      ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:        ${POSTGRES_DB:-kollab-payload-template}
    volumes:
      - pgdata_prod_v2:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
  pgdata_prod_v2:
  payload_media:
