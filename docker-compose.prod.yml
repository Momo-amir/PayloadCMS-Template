services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8890:8890"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=8890
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8890/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kollab-payload-template}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment the following lines if you need to access PostgreSQL from outside the container
    # ports:
    #   - "5432:5432"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - payload
    restart: unless-stopped
    profiles:
      - with-proxy

volumes:
  pgdata_prod:

networks:
  default:
    name: kollab-payload-prod
