services:
  payload:
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /home/node/app

    ports:
      - "8890:8890"

    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - yarn_cache:/home/node/.yarn/berry/cache
    command:
      - sh
      - -c
      - |
        set -e
        yarn install
        yarn dev
        
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - PORT=8890
      - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
      - YARN_CACHE_FOLDER=/home/node/.yarn/berry/cache
    # prevent crash from taking it down
    restart: unless-stopped

  postgres:
    image: postgres:latest
    restart: always
 #   ports:
 #     - "5432:5432"
    environment:
      POSTGRES_USER:      ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:        ${POSTGRES_DB:-kollab-payload-template}
    volumes:
      - pg:/var/lib/postgresql

volumes:
  pg:
  node_modules:
  yarn_cache:
