name: Release create-kollab-payload

# Fires when a commit on main changes the initializer. If its package.json version does not yet have
# a matching git tag, this tags the commit vX.Y.Z (so `npx create-kollab-payload@X.Y.Z` can clone the
# tag) and publishes the package to npm. Every push without a version bump is a safe no-op.
on:
  push:
    branches: [main]
    paths:
      - '.create-kollab-payload/**'
  # Manual trigger — re-run a release without a content change (e.g. after fixing the workflow, or
  # to retry a failed publish). Still a no-op if the current version is already tagged.
  workflow_dispatch:

concurrency:
  group: release-create-kollab-payload
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create + push the vX.Y.Z tag
      id-token: write # mint the OIDC token npm trusted publishing verifies
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Do NOT use setup-node's registry-url: it writes an .npmrc with `always-auth=true`, which
      # forces token auth on every request and overrides OIDC (npm then sends an empty token → 404).
      # We set the registry cleanly (no always-auth) in the publish step instead.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 24 ships an older npm. Pin to 11 (proven
      # for OIDC) rather than @latest — npm 12 is brand-new with install-time security changes we
      # don't want to debug mid-release. Upgrade before the build so prepublishOnly's nested npm
      # invocations also run on the OIDC-capable npm.
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11
          echo "npm is now $(npm --version)"

      - name: Read initializer version
        id: ver
        run: |
          V=$(node -p "require('./.create-kollab-payload/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn if initializer source changed without a version bump
        if: steps.check.outputs.exists == 'true'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep -qE '^\.create-kollab-payload/(src|scripts)/'; then
            echo "::warning::Initializer source changed but package.json version ${{ steps.ver.outputs.version }} is already tagged — bump the version to ship these changes."
          fi

      - name: Install + build initializer
        if: steps.check.outputs.exists == 'false'
        working-directory: .create-kollab-payload
        run: |
          npm ci || npm install
          npm run build

      - name: Diagnose npm auth config
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "npm: $(npm --version)"
          echo "OIDC url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "----- npm config list -----"
          npm config list -l 2>/dev/null | grep -iE "registry|auth|token|provenance|_auth" || true
          echo "----- .npmrc locations -----"
          for f in "$HOME/.npmrc" "$(npm config get globalconfig 2>/dev/null)" "./.npmrc" ".create-kollab-payload/.npmrc"; do
            echo "## $f"
            [ -f "$f" ] && sed -E 's/(_authToken=).*/\1<redacted>/' "$f" || echo "(none)"
          done

      - name: Publish to npm (trusted publisher / OIDC)
        if: steps.check.outputs.exists == 'false'
        working-directory: .create-kollab-payload
        # A stray `_auth` (seen in `npm config list`) makes npm think it's already authenticated with
        # a basic-auth credential, so it never attempts OIDC → ENEEDAUTH. npm reads npm_config_* /
        # NPM_CONFIG_* env vars as config; unset every spelling here so npm falls through to OIDC.
        # (Can't neutralize via env: '' — GitHub folds npm_config__auth/NPM_CONFIG__AUTH to one key.)
        run: |
          unset npm_config__auth NPM_CONFIG__AUTH npm_config_auth NPM_CONFIG_AUTH npm_config__authToken NODE_AUTH_TOKEN
          for f in "$HOME/.npmrc" ./.npmrc; do
            [ -f "$f" ] && sed -i -E '/_authToken|_auth[[:space:]]*=|always-auth/d' "$f" || true
          done
          echo "publishing with npm $(npm --version)"
          echo "_auth after scrub: [$(npm config get _auth 2>/dev/null)]"
          npm publish --access public --provenance --loglevel verbose

      - name: Tag the released commit and push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Summary
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "Released create-kollab-payload@${{ steps.ver.outputs.version }} and pushed tag ${{ steps.ver.outputs.tag }}." >> "$GITHUB_STEP_SUMMARY"
